<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Portfolio Project</title>
    <script src="https://kit.fontawesome.com/9649732a97.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cloud-1">☁️</div>
    <div class="cloud-2">☁️</div>
    <div class="cloud-3">☁️</div>
     <div class="cloud-4">☁️</div>
    
    
    <div class="weather-container">
        <div class="weather-card">
            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather App
            </h1>
            
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleKeyPress(event)">
                <button onclick="getWeather()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <div id="weatherInfo" class="weather-info">
                
            </div>

            <div class="suggestions">
                <p>Popular cities:</p>
                <div class="city-buttons">
                    <button onclick="getWeatherByCity('London')">London</button>
                    <button onclick="getWeatherByCity('New York')">New York</button>
                    <button onclick="getWeatherByCity('Tokyo')">Tokyo</button>
                    <button onclick="getWeatherByCity('Paris')">Paris</button>
                    <button onclick="getWeatherByCity('Dubai')">Dubai</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
